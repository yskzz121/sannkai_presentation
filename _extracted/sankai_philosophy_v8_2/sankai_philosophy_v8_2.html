<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有限会社三海 経営理念体系</title>
<style>
svg { width: 100%; display: block; }
</style>
</head>
<body style="margin:0;padding:16px;background:var(--color-background-primary,#fff)">
<svg viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 400; fill: var(--color-text-primary, #1a1a1a); }
      .ts { font-family: "Anthropic Sans", sans-serif; font-size: 12px; font-weight: 400; fill: var(--color-text-secondary, #555); }
      .th { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 500; fill: var(--color-text-primary, #1a1a1a); }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #3C3489; }
      .c-purple .ts  { fill: #534AB7; }
      .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th    { fill: #0C447C; }
      .c-blue .ts    { fill: #185FA5; }
      .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th    { fill: #085041; }
      .c-teal .ts    { fill: #0F6E56; }
      .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th    { fill: #444441; }
      .c-gray .ts    { fill: #5F5E5A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle" font-size="14">有限会社三海　経営理念体系　第8稿</text>
  <text class="ts" x="340" y="46" text-anchor="middle">兄弟4人による合意確認を経て正式確定とする</text>

  <!-- MISSION -->
  <g class="c-purple">
    <rect x="40" y="62" width="600" height="118" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="90" text-anchor="middle" font-size="13">経営理念（ミッション）</text>
    <line x1="80" y1="102" x2="600" y2="102" stroke="#534AB7" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="340" y="126" text-anchor="middle">三海は、小渡家代々が自由に生きられる</text>
    <text class="ts" x="340" y="148" text-anchor="middle">経済的基盤を築くために存在する。</text>
    <text class="ts" x="340" y="170" text-anchor="middle">資産と信頼を育て、兄弟力を合わせて守り続ける。</text>
  </g>

  <line x1="340" y1="180" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>

  <!-- VISION -->
  <g class="c-blue">
    <rect x="40" y="208" width="600" height="134" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="234" text-anchor="middle" font-size="13">ビジョン（2035年）</text>
    <line x1="80" y1="246" x2="600" y2="246" stroke="#185FA5" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="340" y="268" text-anchor="middle">国内外の不動産・土地資産を保有し、</text>
    <text class="ts" x="340" y="288" text-anchor="middle">兄弟4人がそれぞれの役割で経営に参加する体制を確立している。</text>
    <text class="ts" x="340" y="308" text-anchor="middle">資産が生み出すキャッシュフローによって、</text>
    <text class="ts" x="340" y="328" text-anchor="middle">小渡家代々が「働かざるを得ない」状況から自由になっている。</text>
  </g>

  <line x1="340" y1="342" x2="340" y2="370" class="arr" marker-end="url(#arrow)"/>

  <!-- VALUES header -->
  <g class="c-teal">
    <rect x="40" y="370" width="600" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="393" text-anchor="middle">行動指針（バリュー）——　判断に迷ったときに戻る4つの原則</text>
  </g>

  <!-- Row 1 -->
  <g class="c-teal">
    <rect x="40" y="418" width="290" height="96" rx="6" stroke-width="0.5"/>
    <text class="th" x="185" y="446" text-anchor="middle">① 誠実に向き合う</text>
    <line x1="60" y1="458" x2="310" y2="458" stroke="#0F6E56" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="185" y="478" text-anchor="middle">相手の目を見て話す。</text>
    <text class="ts" x="185" y="498" text-anchor="middle">都合の悪い事実も隠さず伝える。</text>
  </g>
  <g class="c-teal">
    <rect x="350" y="418" width="290" height="96" rx="6" stroke-width="0.5"/>
    <text class="th" x="495" y="446" text-anchor="middle">② 兄弟で決める</text>
    <line x1="370" y1="458" x2="620" y2="458" stroke="#0F6E56" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="495" y="478" text-anchor="middle">独断を避け合議する。</text>
    <text class="ts" x="495" y="498" text-anchor="middle">役割を分け、互いを信頼する。</text>
  </g>

  <!-- Row 2 -->
  <g class="c-teal">
    <rect x="40" y="528" width="290" height="96" rx="6" stroke-width="0.5"/>
    <text class="th" x="185" y="556" text-anchor="middle">③ 数字を直視する</text>
    <line x1="60" y1="568" x2="310" y2="568" stroke="#0F6E56" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="185" y="588" text-anchor="middle">感覚より証拠を優先。</text>
    <text class="ts" x="185" y="608" text-anchor="middle">不都合な数字ほど早く開示する。</text>
  </g>
  <g class="c-teal">
    <rect x="350" y="528" width="290" height="96" rx="6" stroke-width="0.5"/>
    <text class="th" x="495" y="556" text-anchor="middle">④ 長期目線で考える</text>
    <line x1="370" y1="568" x2="620" y2="568" stroke="#0F6E56" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="495" y="588" text-anchor="middle">短期の損益に惑わされず</text>
    <text class="ts" x="495" y="608" text-anchor="middle">代々の視点で判断を下す。</text>
  </g>

  <!-- TASKS -->
  <g class="c-gray">
    <rect x="40" y="642" width="600" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="668" text-anchor="middle">確定に向けた残タスク</text>
    <line x1="80" y1="680" x2="600" y2="680" stroke="#5F5E5A" stroke-width="0.4" opacity="0.35"/>
    <text class="ts" x="60" y="704" text-anchor="start">□　兄弟4人の読み合わせの場を設定し、合意を得た日付を明記して正式確定</text>
    <text class="ts" x="60" y="726" text-anchor="start">□　確定後：中期経営計画書の冒頭に掲載、兄弟4人が署名</text>
  </g>

  <text class="ts" x="640" y="778" text-anchor="end" opacity="0.5">有限会社三海　中期経営計画　第8稿　2026年3月</text>
</svg>
</body>
</html>
